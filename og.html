<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex" />
<title>og</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #f7f4ec; color: #1a1815;
    font-family: "Source Serif 4", Georgia, serif;
    display: grid; grid-template-columns: 1fr 360px; gap: 56px;
    align-items: center; padding: 76px;
    border-bottom: 10px solid #9e3b2e;
  }
  .eyebrow { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #8a8377; margin-bottom: 26px; }
  h1 { font-size: 72px; line-height: 1.04; letter-spacing: -0.02em; font-weight: 700; margin-bottom: 30px; }
  .sub { font-size: 28px; color: #5c574e; }
  .sub b { color: #9e3b2e; font-weight: 600; }
  .credits { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 19px; color: #8a8377; margin-top: 40px; letter-spacing: 0.01em; }
  figure { margin: 0; background: #fff; border: 1px solid #ddd6c6; padding: 12px; border-radius: 4px; }
  figure img { display: block; width: 336px; height: 420px; object-fit: cover; object-position: 50% 28%; border-radius: 2px; }
</style>
</head>
<body>
  <div>
    <div class="eyebrow">Nirav Surabhi</div>
    <h1>Engineering curiosity<br>into useful systems.</h1>
    <div class="sub"><b>Civic aerodynamics</b>, bias-reducing news, and shipped software.</div>
    <div class="credits">Chad vs. Chud (10K+ users) · IEEE passive vortex paper · FTC robotics</div>
  </div>
  <figure><img src="img/face.webp" alt="Nirav Surabhi" /></figure>
</body>
</html>
